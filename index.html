<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#000000">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>NFC Music Tap</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  background:#000 url('play-now.jpg') center center / cover no-repeat fixed;
  color:#fff;
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  padding:24px;
  text-align:center;
  position:relative
}
body::before{
  content:'';
  position:fixed;
  top:0;left:0;right:0;bottom:0;
  background:rgba(0,0,0,0.75);
  z-index:-1
}
.cover{width:240px;height:240px;border-radius:12px;object-fit:cover;box-shadow:0 20px 60px rgba(0,0,0,0.6);margin-bottom:32px;background:#111;opacity:0;transition:opacity .4s}
.cover.loaded{opacity:1}
.title{font-size:1.5rem;font-weight:700;margin-bottom:6px;line-height:1.2}
.meta{font-size:.95rem;color:#888;margin-bottom:32px}
.btn{display:inline-block;background:#1DB954;color:#fff;text-decoration:none;padding:14px 32px;border-radius:30px;font-size:1rem;font-weight:600;-webkit-tap-highlight-color:transparent;transition:transform .1s}
.btn:active{transform:scale(.96)}
.badge{display:inline-block;background:#1DB954;color:#000;font-size:.7rem;font-weight:700;padding:3px 8px;border-radius:4px;margin-bottom:20px;text-transform:uppercase;letter-spacing:.05em}
.fallback{color:#aaa;font-size:1.1rem}
.fallback .emoji{font-size:2rem;margin-bottom:16px;display:block}
#loader{color:#555;font-size:.9rem;margin-bottom:20px}
.hidden{display:none !important}
</style>
</head>
<body>

<div id="loader">Loading now playing…</div>

<div id="card" class="hidden">
  <div class="badge">Now Playing</div>
  <img class="cover" id="cover" src="" alt="cover" crossorigin="anonymous">
  <div class="title" id="title"></div>
  <div class="meta" id="meta"></div>
  <a class="btn" id="btn" href="#">▶ Play on Spotify</a>
</div>

<div id="fallback" class="fallback hidden">
  <div class="emoji">🎵</div>
  Nothing playing right now
</div>

<script>
const LASTFM_API_KEY = 'a97e01d1ca04ed66d629eed5117df482';
const LASTFM_USER = 'wise_song';

async function load() {
  try {
    const url = new URL('https://ws.audioscrobbler.com/2.0/');
    url.searchParams.set('method','user.getrecenttracks');
    url.searchParams.set('user',LASTFM_USER);
    url.searchParams.set('limit','1');
    url.searchParams.set('api_key',LASTFM_API_KEY);
    url.searchParams.set('format','json');

    const res = await fetch(url);
    if(!res.ok) throw new Error('Last.fm error');
    const data = await res.json();
    const track = data?.recenttracks?.track?.[0];

    if(!track) return showFallback();

    const isNowPlaying = track['@attr']?.nowplaying === 'true';
    if(!isNowPlaying) return showFallback();

    const title = track.name || 'Unknown';
    const artist = track.artist?.['#text'] || 'Unknown';
    const album = track.album?.['#text'] || '';
    const image = track.image?.find(i => i.size === 'extralarge')?.['#text'] || '';

    const searchQuery = encodeURIComponent(`${title} ${artist}`);
    const spotifySearch = `spotify://search/${searchQuery}`;
    const spotifyWeb = `https://open.spotify.com/search/${searchQuery}`;

    document.getElementById('title').textContent = title;
    document.getElementById('meta').textContent = album ? `${artist} · ${album}` : artist;

    const cover = document.getElementById('cover');
    if(image) { cover.src = image; cover.onload = () => cover.classList.add('loaded'); }
    else { cover.style.display = 'none'; }

    const btn = document.getElementById('btn');
    btn.href = spotifySearch;
    btn.addEventListener('click', (e) => {
      // Fallback: if spotify:// scheme fails, try web URL
      window.location.href = spotifyWeb;
    });

    document.getElementById('loader').classList.add('hidden');
    document.getElementById('card').classList.remove('hidden');

  } catch(err) {
    console.error(err);
    showFallback();
  }
}

function showFallback() {
  document.getElementById('loader').classList.add('hidden');
  document.getElementById('card').classList.add('hidden');
  document.getElementById('fallback').classList.remove('hidden');
}

load();
</script>

</body>
</html>
