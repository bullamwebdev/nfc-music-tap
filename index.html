<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#000000">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>NFC Music Tap</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  background:#000 url('play-now.jpg') center center / cover no-repeat fixed;
  color:#fff;
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  padding:24px;
  text-align:center
}
.card{
  background:rgba(0,0,0,0.35);
  backdrop-filter:blur(16px) saturate(180%);
  -webkit-backdrop-filter:blur(16px) saturate(180%);
  border:1px solid rgba(255,255,255,0.15);
  border-radius:20px;
  padding:40px 32px;
  box-shadow:0 8px 32px rgba(0,0,0,0.37);
  width:100%;
  max-width:380px;
  display:flex;
  flex-direction:column;
  align-items:center
}
.cover{width:240px;height:240px;border-radius:12px;object-fit:cover;box-shadow:0 20px 60px rgba(0,0,0,0.6);margin-bottom:32px;background:#111;opacity:0;transition:opacity .4s}
.cover.loaded{opacity:1}
.title{font-size:1.5rem;font-weight:700;margin-bottom:6px;line-height:1.2}
.meta{font-size:.95rem;color:#888;margin-bottom:32px}
.btn{display:inline-block;background:#1DB954;color:#fff;text-decoration:none;padding:14px 32px;border-radius:30px;font-size:1rem;font-weight:600;-webkit-tap-highlight-color:transparent;transition:transform .1s}
.btn:active{transform:scale(.96)}
.badge{display:inline-block;background:#1DB954;color:#000;font-size:.7rem;font-weight:700;padding:3px 8px;border-radius:4px;margin-bottom:20px;text-transform:uppercase;letter-spacing:.05em}
.fallback{color:#aaa;font-size:1.1rem}
.fallback .emoji{font-size:2rem;margin-bottom:16px;display:block}
#loader{color:#555;font-size:.9rem;margin-bottom:20px}
.hidden{display:none !important}
</style>
</head>
<body>

<div id="loader">Loading now playing…</div>

<div id="card" class="hidden card">
  <div class="badge">Now Playing</div>
  <img class="cover" id="cover" src="" alt="cover" crossorigin="anonymous">
  <div class="title" id="title"></div>
  <div class="meta" id="meta"></div>
  <a class="btn" id="btn" href="#">▶ Play on Spotify</a>
</div>

<div id="fallback" class="fallback hidden">
  <div class="emoji">🎵</div>
  Nothing playing right now
</div>

<script>
async function load() {
  try {
    const res = await fetch('/api/tap');
    const data = await res.json();

    if (!data.playing) return showFallback();

    document.getElementById('title').textContent = data.title;
    document.getElementById('meta').textContent = data.album ? `${data.artist} · ${data.album}` : data.artist;

    const cover = document.getElementById('cover');
    if (data.image) { cover.src = data.image; cover.onload = () => cover.classList.add('loaded'); }
    else { cover.style.display = 'none'; }

    const btn = document.getElementById('btn');
    if (data.trackUri) {
      btn.href = data.trackUri;
      // Fallback: if deep link fails (Spotify not installed), open web URL after 1.5s
      btn.addEventListener('click', () => {
        setTimeout(() => {
          if (document.visibilityState === 'visible' && data.trackUrl) {
            window.location.href = data.trackUrl;
          }
        }, 1500);
      });
    } else if (data.trackUrl) {
      btn.href = data.trackUrl;
      btn.textContent = 'Open on Spotify';
    } else {
      btn.style.display = 'none';
    }

    document.getElementById('loader').classList.add('hidden');
    document.getElementById('card').classList.remove('hidden');

  } catch (err) {
    console.error(err);
    showFallback();
  }
}

function showFallback() {
  document.getElementById('loader').classList.add('hidden');
  document.getElementById('card').classList.add('hidden');
  document.getElementById('fallback').classList.remove('hidden');
}

load();
</script>

</body>
</html>
